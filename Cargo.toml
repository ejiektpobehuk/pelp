[package]
name = "pelp"
description = "A (p)resentation h(elp)er. Makes it easy to create a revealjs presentation from a Markdown file."
version = "0.1.0"
edition = "2021"
license = "MIT"
authors = ["Vlad Petrov <oss@ejiek.id>"]
repository = "https://github.com/ejiek/pelp"
homepage = "https://github.com/ejiek/pelp"
readme = "README.md"
build = "build.rs"

[dependencies]
clap = { version = "4.5.4", features = ["derive"] }
clap_complete = "4.5.2"

[build-dependencies]
anyhow = "1.0.82"
vergen-gix = { version = "1.0.0-beta.2", features = ["build", "cargo", "rustc", "si"] }
